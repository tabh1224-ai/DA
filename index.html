<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA PARTNERS</title>
<style>
body{font-family:Pretendard, sans-serif;margin:0;background:#fff8e7}
.section{padding:80px 20px}
.container{max-width:1100px;margin:auto}

.platform-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.platform-card{
padding:24px;border-radius:20px;background:#fff;
transition:.25s;cursor:pointer;text-align:center
}
.platform-card:hover{
transform:translateY(-6px) scale(1.03);
background:linear-gradient(135deg,#e6b845,#f4cb66);
box-shadow:0 18px 36px rgba(230,184,69,0.25);
}
.platform-card:hover h4,.platform-card:hover p{color:#1b1b1b}

.platform-icon{
width:60px;height:60px;margin:0 auto 12px;
border-radius:50%;background:#fff;
display:flex;align-items:center;justify-content:center;
box-shadow:0 6px 12px rgba(0,0,0,0.08)
}
.platform-icon img{width:32px;height:32px}

.work-tab-buttons{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.work-tab-btn{
padding:10px 16px;border-radius:999px;border:none;cursor:pointer;
background:#fff;transition:.25s
}
.work-tab-btn:hover{
transform:scale(1.05);
background:#f4cb66
}
.work-tab-btn.active{background:#e6b845}

.work-panel{display:none;padding:40px;border-radius:20px;background:#222;color:#fff}
.work-panel.active{display:block}

</style>
</head>
<body>

<section class="section">
<div class="container">
<h2>플랫폼 관리</h2>

<div class="platform-grid">

<div class="platform-card">
<div class="platform-icon"><img src="baemin.png"></div>
<h4>배달의민족</h4>
<p>메뉴 구성, 운영 흐름, 노출 포인트를 점검해 기본 운영 구조를 안정화합니다.</p>
</div>

<div class="platform-card">
<div class="platform-icon"><img src="yogiyo.png"></div>
<h4>요기요</h4>
<p>플랫폼 특성에 맞는 운영 방식으로 주문 연결 가능성을 높입니다.</p>
</div>

<div class="platform-card">
<div class="platform-icon"><img src="coupang.png"></div>
<h4>쿠팡이츠</h4>
<p>간결한 구조 안에서 효율적으로 운영될 수 있도록 관리 포인트를 정리합니다.</p>
</div>

<div class="platform-card">
<div class="platform-icon"><img src="daangn.png"></div>
<h4>당근</h4>
<p>지역 기반 고객 유입 채널로 활용해 매장 인지도와 접근성을 높입니다.</p>
</div>

</div>
</div>
</section>

<section class="section">
<div class="container">
<h2>주요 업무</h2>

<div class="work-tab-buttons">
<button class="work-tab-btn active" data-tab="0">배달앱 관리</button>
<button class="work-tab-btn" data-tab="1">메뉴 구성</button>
<button class="work-tab-btn" data-tab="2">디자인 관리</button>
<button class="work-tab-btn" data-tab="3">리뷰 관리</button>
</div>

<div class="work-panel active">
<h3>배달앱 최적화 관리</h3>
<p>플랫폼별 구조 및 노출 최적화</p>
</div>

<div class="work-panel">
<h3>메뉴 구성</h3>
<p>구매 전환 중심 메뉴 설계</p>
</div>

<div class="work-panel">
<h3>디자인 관리</h3>
<p>썸네일/배너 최적화</p>
</div>

<div class="work-panel">
<h3>리뷰 관리</h3>
<p>고객 응대 및 신뢰도 강화</p>
</div>

</div>
</section>

<script>
const btns=document.querySelectorAll('.work-tab-btn')
const panels=document.querySelectorAll('.work-panel')

btns.forEach((btn,i)=>{
btn.addEventListener('click',()=>{
btns.forEach(b=>b.classList.remove('active'))
panels.forEach(p=>p.classList.remove('active'))
btn.classList.add('active')
panels[i].classList.add('active')
})
})
</script>

</body>
</html>
